# ============================================================
# Konfiguracja TGE Data Scraper
# ============================================================

email:
  smtp_server: smtp.gmail.com
  smtp_port: 587
  sender_email: twoj_email@gmail.com
  sender_password: twoje_haslo_aplikacji
  recipients:
    - odbiorca1@example.com
    - odbiorca2@example.com
  subject: "TGE - Codzienny raport rynkowy"
  attach_excel: true

schedule:
  frequency: daily
  time: "14:00"
  day: monday

scraping:
  sources:
    energy_base: https://tge.pl/energia-elektryczna-otf
    power_spot: https://tge.pl/energia-elektryczna-rdn
    gas_spot: https://tge.pl/gaz-rdn
    co2_history: https://pl.investing.com/etfs/co2-historical-data?utm_source=chatgpt.com
  urls:
    - https://tge.pl/energia-elektryczna-otf
    - https://tge.pl/energia-elektryczna-rdn
    - https://tge.pl/gaz-rdn
    - https://pl.investing.com/etfs/co2-historical-data?utm_source=chatgpt.com
  page_load_timeout: 30
  wait_for_js: 5
  retry_count: 3
  headless: true
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"

data:
  output_file: tge_dane_historyczne.xlsx
  date_column: Data_Pobrania
  date_format: "%Y-%m-%d %H:%M:%S"
  output_dir: ""
